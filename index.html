<!DOCTYPE html>
<html>
<body>
<h1>Escola / Matrícula</h1>

<p>Colégio:</p>
<img src="https://i.imgur.com/p0e3xjY.jpeg" width="200"><br>

<p>Academia de Karatê:</p>
<img src="https://i.imgur.com/QRCaVGJ.png" width="200"><br>

<hr>
<h1>TESTE NOVO</h1>

<!-- 🔹 CADASTRO -->
<h2>Cadastro de Aluno</h2>

<input id="nome" placeholder="Nome do aluno"><br>
<input id="nomeResponsavel" placeholder="Nome do responsável"><br>

<input id="cpfResponsavel" placeholder="CPF do responsável"><br>
<input id="cpf" placeholder="CPF do aluno"><br>

<input id="telefoneResponsavel" placeholder="Telefone do responsável"><br>
<input id="telefoneAluno" placeholder="Telefone do aluno"><br>
<input id="fotoInstituicao" placeholder="Link da foto do colégio"><br>
<input id="fotoAcademia" placeholder="Link da foto da academia"><br>
<button onclick="cadastrar()">Cadastrar</button>

<hr>

<!-- 🔐 ÁREA ADM -->
<h2>Área do Administrador</h2>

<input id="user" placeholder="Usuário"><br>
<input id="pass" type="password" placeholder="Senha"><br>

<button onclick="login()">Entrar</button>

<hr>

<div id="painel"></div>

<script>
async function cadastrar() {
  try {
    const res = await fetch('https://sistema-escola-2njr.onrender.com/cadastro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
  nomeAluno: document.getElementById('nome').value,
  cpfAluno: document.getElementById('cpf').value,
  nomeResponsavel: document.getElementById('nomeResponsavel').value,
  cpfResponsavel: document.getElementById('cpfResponsavel').value,
  telefoneAluno: document.getElementById('telefoneAluno').value,
  telefoneResponsavel: document.getElementById('telefoneResponsavel').value,

  fotoInstituicao: document.getElementById('fotoInstituicao').value,
  fotoAcademia: document.getElementById('fotoAcademia').value,

  turno: 'Noturno'
})
    });

    alert(await res.text());

  } catch {
    alert('Erro ao cadastrar');
  }
}

async function login() {
  try {
    const res = await fetch('https://sistema-escola-2njr.onrender.com/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user: document.getElementById('user').value,
        pass: document.getElementById('pass').value
      })
    });

    const data = await res.json();

    if (data.ok) {
      alert('Logado!');
      carregar();
    } else {
      alert('Login inválido');
    }

  } catch {
    alert('Erro ao conectar');
  }
}

async function carregar() {
  const res = await fetch('https://sistema-escola-2njr.onrender.com/alunos');
  const dados = await res.json();

  let html = '<h3>Alunos:</h3>';

  dados.forEach(a => {
    html += `
      <div style="border:1px solid black; margin:10px; padding:10px;">
        
        <p onclick="verDetalhes('${a._id}')" style="cursor:pointer;">
          <b>${a.nomeAluno}</b> (clique para ver)
        </p>

        <div id="detalhe-${a._id}" style="display:none;">
          <p>Responsável: ${a.nomeResponsavel}</p>
          <p>CPF Responsável: ${a.cpfResponsavel}</p>
          <p>CPF Aluno: ${a.cpfAluno}</p>
          <p>Tel Responsável: ${a.telefoneResponsavel}</p>
          <p>Tel Aluno: ${a.telefoneAluno}</p>
          <p>Turno: ${a.turno}</p>

          <p>Colégio:</p>
          <img src="${a.fotoInstituicao}" width="100"><br>

          <p>Academia:</p>
          <img src="${a.fotoAcademia}" width="100"><br>

          <button onclick="editar('${a._id}')">Editar</button>
          <button onclick="excluir('${a._id}')">Excluir</button>
        </div>

      </div>
    `;
  });

  document.getElementById('painel').innerHTML = html;
}
  function verDetalhes(id) {
  const div = document.getElementById('detalhe-' + id);

  if (div.style.display === 'none') {
    div.style.display = 'block';
  } else {
    div.style.display = 'none';
  }
  }
  async function excluir(id) {
  await fetch('https://sistema-escola-2njr.onrender.com/alunos/' + id, {
    method: 'DELETE'
  });

  alert('Excluído!');
  carregar();
  }
  async function editar(id) {
  const novoNome = prompt('Novo nome:');

  await fetch('https://sistema-escola-2njr.onrender.com/alunos/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      nomeAluno: novoNome
    })
  });

  alert('Atualizado!');
  carregar();
  }
</script>

</body>
</html>
