<!DOCTYPE html>
<html>
<body>
<h1>TESTE NOVO</h1>
<h2>Teste</h2>

<input id="user" placeholder="Usuário"><br>
<input id="pass" placeholder="Senha"><br>

<button onclick="login()">Entrar</button>

<script>
async function login() {
  alert('clicou login');

  try {
    alert('indo conectar...');

    const res = await fetch('https://sistema-escola-2njr.onrender.com/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user: document.getElementById('user').value,
        pass: document.getElementById('pass').value
      })
    });

    alert('conectou');

    const texto = await res.text();

    alert('RESPOSTA: ' + texto);

  } catch (err) {
    alert('ERRO: ' + err.message);
  }
}
</script>

</body>
</html>
