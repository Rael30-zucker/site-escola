<!DOCTYPE html>
<html>
<body>
<h1>TESTE NOVO</h1>
<h2>Teste</h2>

<input id="user" placeholder="Usuário"><br>
<input id="pass" placeholder="Senha"><br>

<button onclick="login()">Entrar</button>
<div id="painel"></div>
<script>
async function login() {
  try {
    const res = await fetch('https://sistema-escola-2njr.onrender.com/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user: document.getElementById('user').value,
        pass: document.getElementById('pass').value
      })
    });

    const data = await res.json();

    if (data.ok) {
      alert('Logado com sucesso!');
      carregar(); // 🔥 AQUI MOSTRA OS ALUNOS
    } else {
      alert('Login inválido');
    }

  } catch (err) {
    alert('Erro ao conectar com servidor');
  }
}
</script>
<script>
async function carregar() {
  const res = await fetch('https://sistema-escola-2njr.onrender.com/alunos');
  const dados = await res.json();

  let html = '';

  dados.forEach(a => {
    html += '<p>' + a.nomeAluno + '</p>';
  });

  document.getElementById('painel').innerHTML = html;
}
</script>
  async function carregar() {
  const res = await fetch('https://sistema-escola-2njr.onrender.com/alunos');
  const dados = await res.json();

  let html = '<h3>Alunos:</h3>';

  dados.forEach(a => {
    html += `<p>${a.nomeAluno}</p>`;
  });

  document.getElementById('painel').innerHTML = html;
}
</body>
</html>
