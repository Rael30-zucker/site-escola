<!DOCTYPE html>
<html>
<head>
  <title>Escola Karatê - Matrícula</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
      text-align: center;
    }

    .topo {
      background: #222;
      color: white;
      padding: 20px;
    }

    .imagens {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px;
    }

    .imagens img {
      width: 200px;
      border-radius: 10px;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      width: 95%;
      background: #222;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>

<body>

<!-- 🔝 TOPO -->
<div class="topo">
  <h1>Escola & Karatê</h1>
  <p>Sistema de Matrícula</p>
</div>

<!-- 🖼️ IMAGENS FIXAS -->
<div class="imagens">
  <div>
    <p>Colégio</p>
    <img src="https://i.imgur.com/p0e3xjY.jpeg">
  </div>

  <div>
    <p>Karatê</p>
    <img src="https://i.imgur.com/QRCaVGJ.png">
  </div>
</div>

<!-- 📝 CADASTRO -->
<div class="box">
  <h2>Cadastro de Aluno</h2>

  <input id="nome" placeholder="Nome do aluno">
  <input id="nomeResponsavel" placeholder="Nome do responsável">

  <input id="cpfResponsavel" placeholder="CPF do responsável">
  <input id="cpf" placeholder="CPF do aluno">

  <input id="telefoneResponsavel" placeholder="Telefone do responsável">
  <input id="telefoneAluno" placeholder="Telefone do aluno">

  <button onclick="cadastrar()">Cadastrar</button>
</div>

<!-- 🔐 LOGIN ADM -->
<div class="box">
  <h2>Área do Administrador</h2>

  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
</div>

<!-- 📊 PAINEL -->
<div id="painel"></div>

<script>
async function cadastrar() {
  try {
    await fetch('https://sistema-escola-2njr.onrender.com/cadastro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nomeAluno: document.getElementById('nome').value,
        cpfAluno: document.getElementById('cpf').value,
        nomeResponsavel: document.getElementById('nomeResponsavel').value,
        cpfResponsavel: document.getElementById('cpfResponsavel').value,
        telefoneAluno: document.getElementById('telefoneAluno').value,
        telefoneResponsavel: document.getElementById('telefoneResponsavel').value,
        turno: 'Noturno'
      })
    });

    alert('Cadastrado com sucesso!');
  } catch {
    alert('Erro ao cadastrar');
  }
}

async function login() {
  try {
    const res = await fetch('https://sistema-escola-2njr.onrender.com/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user: document.getElementById('user').value,
        pass: document.getElementById('pass').value
      })
    });

    const data = await res.json();

    if (data.ok) {
      alert('Logado!');
      carregar();
    } else {
      alert('Login inválido');
    }

  } catch {
    alert('Erro ao conectar');
  }
}

async function carregar() {
  const res = await fetch('https://sistema-escola-2njr.onrender.com/alunos');
  const dados = await res.json();

  let html = '<h3>Alunos:</h3>';

  dados.forEach(a => {
    html += `
      <div style="border:1px solid black; margin:10px; padding:10px;">
        
        <p onclick="verDetalhes('${a._id}')" style="cursor:pointer;">
          <b>${a.nomeAluno}</b> (clique para ver)
        </p>

        <div id="detalhe-${a._id}" style="display:none;">
          <p>Responsável: ${a.nomeResponsavel}</p>
          <p>CPF Responsável: ${a.cpfResponsavel}</p>
          <p>CPF Aluno: ${a.cpfAluno}</p>
          <p>Tel Responsável: ${a.telefoneResponsavel}</p>
          <p>Tel Aluno: ${a.telefoneAluno}</p>
          <p>Turno: ${a.turno}</p>

          <button onclick="editar('${a._id}')">Editar</button>
          <button onclick="excluir('${a._id}')">Excluir</button>
        </div>

      </div>
    `;
  });

  document.getElementById('painel').innerHTML = html;
}

function verDetalhes(id) {
  const div = document.getElementById('detalhe-' + id);
  div.style.display = div.style.display === 'none' ? 'block' : 'none';
}

async function excluir(id) {
  await fetch('https://sistema-escola-2njr.onrender.com/alunos/' + id, {
    method: 'DELETE'
  });

  alert('Excluído!');
  carregar();
}

async function editar(id) {
  const nomeAluno = prompt('Nome do aluno:');
  const nomeResponsavel = prompt('Nome do responsável:');
  const cpfAluno = prompt('CPF do aluno:');
  const cpfResponsavel = prompt('CPF do responsável:');
  const telefoneAluno = prompt('Telefone do aluno:');
  const telefoneResponsavel = prompt('Telefone do responsável:');

  await fetch('https://sistema-escola-2njr.onrender.com/alunos/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      nomeAluno,
      nomeResponsavel,
      cpfAluno,
      cpfResponsavel,
      telefoneAluno,
      telefoneResponsavel
    })
  });

  alert('Atualizado!');
  carregar();
}
</script>

</body>
</html>
