<!DOCTYPE html>
<html>
<body>

<h1>TESTE NOVO</h1>

<input id="user" placeholder="Usuário"><br>
<input id="pass" placeholder="Senha"><br>

<button onclick="login()">Entrar</button>

<div id="painel"></div>

<script>
async function login() {
  try {
    const res = await fetch('https://sistema-escola-2njr.onrender.com/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user: document.getElementById('user').value,
        pass: document.getElementById('pass').value
      })
    });

    const data = await res.json();

    if (data.ok) {
      alert('Logado!');
      carregar();
    } else {
      alert('Erro no login');
    }

  } catch (err) {
    alert('Erro ao conectar');
  }
}

async function carregar() {
async function carregar() {
  const res = await fetch('https://sistema-escola-2njr.onrender.com/alunos');
  const dados = await res.json();

  let html = '<h3>Alunos:</h3>';

  dados.forEach(a => {
    html += `
      <div style="border:1px solid #000; margin:10px; padding:10px;">
        <p><b>Nome:</b> ${a.nomeAluno}</p>
        <p><b>Responsável:</b> ${a.nomeResponsavel || 'Não informado'}</p>
        <p><b>Telefone Aluno:</b> ${a.telefoneAluno || 'Não informado'}</p>
        <p><b>Telefone Responsável:</b> ${a.telefoneResponsavel || 'Não informado'}</p>
        <p><b>CPF Aluno:</b> ${a.cpfAluno}</p>
        <p><b>CPF Responsável:</b> ${a.cpfResponsavel || 'Não informado'}</p>
        <p><b>Turno:</b> ${a.turno}</p>
      </div>
    `;
  });

  document.getElementById('painel').innerHTML = html;
}
</script>

</body>
</html>
