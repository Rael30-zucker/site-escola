<!DOCTYPE html>
<html>
<body>
<h1>TESTE NOVO</h1>
<h2>Teste</h2>

<input id="user" placeholder="Usuário"><br>
<input id="pass" placeholder="Senha"><br>

<button onclick="login()">Entrar</button>

<script>
async function login() {
  alert('clicou login');

  try {
    const res = await fetch('https://sistema-escola-2njr.onrender.com/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user: user.value,
        pass: pass.value
      })
    });

    const texto = await res.text();

    alert(texto);

  } catch (err) {
    alert('Erro ao conectar');
  }
}
</script>

</body>
</html>
