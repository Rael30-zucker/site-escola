<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sistema Escola</title>
</head>
<body>

<h2>Cadastro</h2>
<input id="nome" placeholder="Nome"><br>
<input id="idade" placeholder="Idade"><br>
<input id="cpf" placeholder="CPF"><br>
<input id="instituicao" placeholder="Instituição"><br>
<input id="turno" placeholder="Turno"><br>

<button onclick="cadastrar()">Cadastrar</button>

<hr>

<h3>Login ADM</h3>
<input id="user" placeholder="Usuário"><br>
<input id="pass" type="password" placeholder="Senha"><br>

<button onclick="login()">Entrar</button>

<div id="painel"></div>

<script>
const API = 'https://sistema-escola-2njr.onrender.com';

async function cadastrar() {
  try {
    const res = await fetch(API + '/cadastro', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        nomeAluno: nome.value,
        idadeAluno: parseInt(idade.value),
        cpfAluno: cpf.value,
        instituicao: instituicao.value,
        turno: turno.value
      })
    });

    alert(await res.text());

  } catch {
    alert('Erro ao conectar');
  }
}

async function login() {
  try {
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        user: user.value,
        pass: pass.value
      })
    });

    if (res.ok) {
      alert('Logado!');
      carregar();
    } else {
      alert('Erro no login');
    }

  } catch {
    alert('Servidor offline');
  }
}

async function carregar() {
  const res = await fetch(API + '/alunos');
  const dados = await res.json();

  let html = '<h3>Alunos:</h3>';

  dados.forEach(a => {
    html += `<p>${a.nomeAluno} - ${a.instituicao} - ${a.turno}</p>`;
  });

  painel.innerHTML = html;
}
</script>

</body>
</html>
